{% extends "base_joc.html" %}
{% block title %}Aventură{% endblock %}
{% block content_class %}pet-content-city{% endblock %}

{% block content %}
<div id="aventura-wrap" style="position:relative;width:100%;height:calc(100vh - var(--footbar-h));overflow:hidden;background:#000;">
    <div id="phaser-container"></div>

    <!-- HUD -->
    <div id="aventura-hud" style="position:absolute;top:12px;left:12px;z-index:50;">
        <a href="/joc/petomania/acasa"
           style="background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.2);
                  color:#fff;padding:6px 14px;border-radius:8px;font-size:13px;
                  text-decoration:none;font-family:'Cinzel',serif;">
            ← Regat
        </a>
    </div>

    <!-- Map name HUD -->
    <div id="map-name-hud" style="position:absolute;top:12px;right:12px;z-index:50;
         background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.15);
         color:rgba(255,255,255,0.7);padding:6px 14px;border-radius:8px;
         font-size:12px;font-family:'Cinzel',serif;"></div>

    <!-- Zuno dialog -->
    <div id="zuno-dialog" style="display:none;position:absolute;inset:0;z-index:100;
         background:rgba(0,0,0,0.82);align-items:flex-end;justify-content:center;padding-bottom:20px;">
        <div style="background:var(--bg-elev,#1a1d23);border:1px solid rgba(201,168,76,0.3);
                    border-radius:16px;padding:0;max-width:480px;width:100%;overflow:hidden;position:relative;">
            <!-- Zuno image -->
            <div style="display:flex;align-items:flex-end;gap:0;background:linear-gradient(135deg,#1a1d23,#0d0f14);">
                <img src="/static/aventura/Zuno.png" alt="Zuno"
                     style="height:180px;object-fit:contain;object-position:bottom;flex-shrink:0;">
                <div style="padding:20px 20px 20px 8px;flex:1;">
                    <div style="font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:#c9a84c;margin-bottom:6px;">
                        Zuno
                    </div>
                    <div id="zuno-text" style="font-size:13px;color:rgba(255,255,255,0.8);line-height:1.6;">
                    </div>
                </div>
            </div>
            <!-- Buttons -->
            <div id="zuno-actions" style="display:flex;gap:10px;padding:14px 20px;border-top:1px solid rgba(255,255,255,0.08);justify-content:flex-end;">
            </div>
            <div id="zuno-msg" style="font-size:12px;color:#4caf7d;padding:0 20px 12px;min-height:16px;text-align:right;"></div>
        </div>
    </div>

    <!-- Vaca dialog -->
    <div id="vaca-dialog" style="display:none;position:absolute;inset:0;z-index:100;
         background:rgba(0,0,0,0.75);align-items:center;justify-content:center;">
        <div style="background:var(--bg-elev,#1a1d23);border:1px solid rgba(255,255,255,0.15);
                    border-radius:16px;padding:28px 32px;max-width:320px;text-align:center;">
            <div style="font-size:48px;margin-bottom:12px;">🐄</div>
            <div style="font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:#c9a84c;margin-bottom:8px;">
                Vacă
            </div>
            <div style="font-size:14px;color:rgba(255,255,255,0.7);margin-bottom:20px;">
                Vrei să mulgi vaca?
            </div>
            <div style="display:flex;gap:12px;justify-content:center;">
                <button onclick="mulgeVaca()"
                        style="background:#c9a84c;color:#1a1300;font-family:'Cinzel',serif;
                               font-weight:700;padding:10px 24px;border:none;border-radius:8px;cursor:pointer;">
                    ✅ Da
                </button>
                <button onclick="closeVacaDialog()"
                        style="background:rgba(255,255,255,0.1);color:#fff;font-family:'Cinzel',serif;
                               padding:10px 24px;border:1px solid rgba(255,255,255,0.2);
                               border-radius:8px;cursor:pointer;">
                    ❌ Nu
                </button>
            </div>
            <div id="vaca-msg" style="font-size:13px;color:#4caf7d;margin-top:12px;min-height:18px;"></div>
        </div>
    </div>
    <div id="transition-fade" style="position:absolute;inset:0;z-index:90;
         background:#000;opacity:0;pointer-events:none;transition:opacity 0.4s;"></div>

    <!-- Encounter overlay -->
    <div id="encounter-overlay" style="display:none;position:absolute;inset:0;z-index:100;
         background:rgba(0,0,0,0.85);align-items:center;justify-content:center;flex-direction:column;gap:16px;">
        <div style="font-family:'Cinzel',serif;font-size:22px;color:#c9a84c;font-weight:700;">
            ⚔️ Un companion sălbatic a apărut!
        </div>
        <div id="encounter-msg" style="font-size:14px;color:rgba(255,255,255,0.7);text-align:center;"></div>
        <div style="display:flex;gap:12px;margin-top:8px;">
            <button onclick="goToVanatoare()"
                    style="background:#c9a84c;color:#1a1300;font-family:'Cinzel',serif;font-weight:700;
                           padding:12px 28px;border:none;border-radius:8px;cursor:pointer;font-size:15px;">
                ⚔️ Luptă
            </button>
            <button onclick="closeEncounter()"
                    style="background:rgba(255,255,255,0.1);color:#fff;font-family:'Cinzel',serif;
                           padding:12px 28px;border:1px solid rgba(255,255,255,0.2);border-radius:8px;
                           cursor:pointer;font-size:15px;">
                🏃 Fugi
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<style>
#phaser-container canvas { display: block; }
</style>
<script>
// ── CONFIG ──────────────────────────────────────────────
const PLAYER_SPEED     = 100;
const PLAYER_SPRINT    = 200;
const ENCOUNTER_CHANCE = 0.008;
const MAPS_BASE        = '/static/aventura/';
const TILESET_IMG      = MAPS_BASE + 'Main.png';

// Harta curenta — poate fi schimbata prin URL param
const urlParams  = new URLSearchParams(window.location.search);
let currentMap   = urlParams.get('map') || '01_EntryMap';
let spawnFromMap = urlParams.get('from') || null; // de unde venim

let encounterCooldown = 0;
let inEncounter       = false;
let transitioning     = false;
let transitionCooldown = 2000; // ms — nu triggera tranzitii imediat la load

// ── LAYER NAMES ─────────────────────────────────────────
// Toate layerele posibile din ambele mape — cele care lipsesc sunt ignorate
const TILE_LAYERS = [
    'Apa', 'Land', 'Grass', 'Drum', 'Deal', 'Boarder',
    'Gard', 'Gard2', 'Gardfix', 'Stump', 'Trunks',
    'Flori', 'Legume', 'Sign', 'CompFind', 'Comfind',
    'Pietre', 'CopaciSub', 'Copaci', 'Casa', 'npc',
];
const OVER_PLAYER = ['Copaci', 'Casa']; // layere care apar peste player

// ── SCENE ───────────────────────────────────────────────
class AdventureScene extends Phaser.Scene {
    constructor() { super('AdventureScene'); }

    preload() {
        this.load.image('tiles', TILESET_IMG);
        this.load.tilemapTiledJSON('map', MAPS_BASE + currentMap + '.tmj');
        this.load.spritesheet('player', MAPS_BASE + 'player_sheet.png', {
            frameWidth: 48, frameHeight: 48
        });
    }

    create() {
        // Update HUD
        document.getElementById('map-name-hud').textContent = currentMap.replace(/_/g, ' ');

        const map = this.make.tilemap({ key: 'map' });
        this.mapRef = map;
        const tileset = map.addTilesetImage('Main', 'tiles');

        // Tile layers
        this.tileLayers = {};
        TILE_LAYERS.forEach(name => {
            try {
                const l = map.createLayer(name, tileset, 0, 0);
                if (l) {
                    this.tileLayers[name] = l;
                    if (OVER_PLAYER.includes(name)) l.setDepth(15);
                }
            } catch(e) {}
        });

        // Determina spawn
        let spawnX, spawnY;

        // Daca avem pozitie salvata din lupta anterioara
        const savedX = sessionStorage.getItem('aventura_x');
        const savedY = sessionStorage.getItem('aventura_y');
        if (savedX && savedY) {
            spawnX = parseFloat(savedX);
            spawnY = parseFloat(savedY);
            sessionStorage.removeItem('aventura_x');
            sessionStorage.removeItem('aventura_y');
        }
        // Daca venim dintr-o alta mapa, spawnam la transition zone corespunzatoare
        else if (spawnFromMap) {
            const fromLayer = map.getObjectLayer(spawnFromMap);
            if (fromLayer && fromLayer.objects.length > 0) {
                const sp = fromLayer.objects[0];
                spawnX = sp.x + sp.width / 2;
                spawnY = sp.y + sp.height / 2;
            }
        }

        // Fallback la PlayerSpawn
        if (!spawnX) {
            const spawnLayer = map.getObjectLayer('PlayerSpawn');
            if (spawnLayer && spawnLayer.objects.length > 0) {
                const sp = spawnLayer.objects[0];
                spawnX = sp.x + sp.width / 2;
                spawnY = sp.y + sp.height / 2;
            } else {
                spawnX = map.widthInPixels / 2;
                spawnY = map.heightInPixels / 2;
            }
        }

        // Player
        this.player = this.physics.add.sprite(spawnX, spawnY, 'player', 0);
        this.player.setScale(1.0);
        this.player.setDepth(10);
        this.player.setCollideWorldBounds(true);
        this.player.body.setSize(12, 12);
        this.player.body.setOffset(18, 32);
        this.physics.world.setBounds(0, 0, map.widthInPixels, map.heightInPixels);

        // Animatii
        const COLS = 6;
        const animDefs = [
            { key: 'idle-down',  frames: [0],           rate: 1,  rep: 0  },
            { key: 'idle-left',  frames: [COLS],        rate: 1,  rep: 0  },
            { key: 'idle-right', frames: [COLS*2],      rate: 1,  rep: 0  },
            { key: 'idle-up',    frames: [COLS*3],      rate: 1,  rep: 0  },
            { key: 'walk-down',  frames: this._range(COLS*4, COLS*4+5), rate: 8, rep: -1 },
            { key: 'walk-left',  frames: this._range(COLS*5, COLS*5+5), rate: 8, rep: -1 },
            { key: 'walk-right', frames: this._range(COLS*6, COLS*6+5), rate: 8, rep: -1 },
            { key: 'walk-up',    frames: this._range(COLS*7, COLS*7+5), rate: 8, rep: -1 },
        ];
        animDefs.forEach(a => {
            if (!this.anims.exists(a.key)) {
                this.anims.create({
                    key: a.key,
                    frames: a.frames.map(f => ({ key: 'player', frame: f })),
                    frameRate: a.rate,
                    repeat: a.rep
                });
            }
        });
        this.player.anims.play('idle-down');

        // Coliziuni — suporta ambele nume (Colision si Collison)
        const colLayer = map.getObjectLayer('Colision') || map.getObjectLayer('Collison');
        if (colLayer) {
            this.colliders = this.physics.add.staticGroup();
            colLayer.objects.forEach(obj => {
                const rect = this.add.rectangle(
                    obj.x + obj.width / 2,
                    obj.y + obj.height / 2,
                    obj.width, obj.height
                ).setVisible(false);
                this.physics.add.existing(rect, true);
                this.colliders.add(rect);
            });
            this.physics.add.collider(this.player, this.colliders);
        }

        // MobSpawn zones — suporta si Comfind (vechea mapa)
        this.comfindZones = [];
        const mobLayer = map.getObjectLayer('MobSpawn') || map.getObjectLayer('Comfind');
        if (mobLayer) {
            mobLayer.objects.forEach(obj => {
                this.comfindZones.push({
                    left: obj.x, right: obj.x + obj.width,
                    top: obj.y,  bottom: obj.y + obj.height
                });
            });
        }

        // Transition zones — cauta toate layerele care se termina in "Map" sau "Oras"
        this.transitionZones = [];
        map.objects.forEach(layer => {
            const isTransition = (layer.name.endsWith('Map') || layer.name.endsWith('Oras')) 
                                 && layer.name !== currentMap;
            if (isTransition) {
                layer.objects.forEach(obj => {
                    this.transitionZones.push({
                        target: layer.name,
                        left: obj.x, right: obj.x + obj.width,
                        top: obj.y,  bottom: obj.y + obj.height
                    });
                });
            }
        });

        // Vaca zones
        this.vacaZones = [];
        const vacaLayer = map.getObjectLayer('Vaca');
        if (vacaLayer) {
            vacaLayer.objects.forEach(obj => {
                this.vacaZones.push({
                    left:   obj.x - 16,
                    right:  obj.x + obj.width + 16,
                    top:    obj.y - 16,
                    bottom: obj.y + obj.height + 16,
                });
            });
        }

        // NPC zones — cauta layer Zuno sau npcBody
        this.npcZones = [];
        const npcObjLayer = map.getObjectLayer('Zuno') || map.getObjectLayer('npcBody') || map.getObjectLayer('NpcObjects');
        if (npcObjLayer) {
            npcObjLayer.objects.forEach(obj => {
                this.npcZones.push({
                    name:   npcObjLayer.name === 'Zuno' ? 'Zuno' : (obj.name || 'npc'),
                    left:   obj.x - 16,
                    right:  obj.x + obj.width + 16,
                    top:    obj.y - 16,
                    bottom: obj.y + obj.height + 16,
                });
            });
        }
        this.camZoom = 3.5;
        this.cameras.main.setBounds(0, 0, map.widthInPixels, map.heightInPixels);
        this.cameras.main.setZoom(this.camZoom);
        this.cameras.main.roundPixels = true;
        this.cameras.main.startFollow(this.player, true, 1, 1);

        // Input
        this.cursors = this.input.keyboard.createCursorKeys();
        this.wasd = this.input.keyboard.addKeys({
            up:     Phaser.Input.Keyboard.KeyCodes.W,
            down:   Phaser.Input.Keyboard.KeyCodes.S,
            left:   Phaser.Input.Keyboard.KeyCodes.A,
            right:  Phaser.Input.Keyboard.KeyCodes.D,
            sprint: Phaser.Input.Keyboard.KeyCodes.SHIFT,
            interact: Phaser.Input.Keyboard.KeyCodes.SPACE,
        });
    }

    _range(s, e) {
        const a = [];
        for (let i = s; i <= e; i++) a.push(i);
        return a;
    }

    update(time, delta) {
        if (inEncounter || transitioning) {
            this.player.setVelocity(0, 0);
            return;
        }

        const left  = this.cursors.left.isDown  || this.wasd.left.isDown;
        const right = this.cursors.right.isDown || this.wasd.right.isDown;
        const up    = this.cursors.up.isDown    || this.wasd.up.isDown;
        const down  = this.cursors.down.isDown  || this.wasd.down.isDown;

        const sprint = this.wasd.sprint.isDown || this.cursors.shift?.isDown;
        const speed  = sprint ? PLAYER_SPRINT : PLAYER_SPEED;

        let vx = 0, vy = 0;
        if (left)  vx = -speed;
        if (right) vx =  speed;
        if (up)    vy = -speed;
        if (down)  vy =  speed;
        if (vx !== 0 && vy !== 0) { vx *= 0.707; vy *= 0.707; }

        this.player.setVelocity(vx, vy);

        // Space — interact
        if (Phaser.Input.Keyboard.JustDown(this.wasd.interact)) {
            const px2 = this.player.x;
            const py2 = this.player.y;
            const nearVaca = this.vacaZones && this.vacaZones.some(z =>
                px2 >= z.left && px2 <= z.right && py2 >= z.top && py2 <= z.bottom
            );
            const nearNpc = this.npcZones && this.npcZones.find(z =>
                px2 >= z.left && px2 <= z.right && py2 >= z.top && py2 <= z.bottom
            );
            if (nearNpc) {
                showNpcDialog(nearNpc.name);
            } else if (nearVaca) {
                showVacaDialog();
            }
        }

        // Animatii
        if (vx === 0 && vy === 0) {
            const cur = this.player.anims.currentAnim?.key || 'idle-down';
            const dir = cur.replace('walk-','').replace('idle-','');
            this.player.anims.play('idle-' + dir, true);
        } else if (Math.abs(vx) > Math.abs(vy)) {
            this.player.anims.play(vx < 0 ? 'walk-left' : 'walk-right', true);
        } else {
            this.player.anims.play(vy < 0 ? 'walk-up' : 'walk-down', true);
        }

        const px = this.player.x;
        const py = this.player.y;

        // Transition check
        if (!transitioning && transitionCooldown <= 0) {
            for (const zone of this.transitionZones) {
                if (px >= zone.left && px <= zone.right && py >= zone.top && py <= zone.bottom) {
                    doTransition(zone.target, currentMap);
                    return;
                }
            }
        }
        if (transitionCooldown > 0) transitionCooldown -= delta;

        // Encounter check
        if (encounterCooldown > 0) {
            encounterCooldown -= delta;
        } else {
            const inZone = this.comfindZones.some(z =>
                px >= z.left && px <= z.right && py >= z.top && py <= z.bottom
            );
            if (inZone && (vx !== 0 || vy !== 0) && Math.random() < ENCOUNTER_CHANCE) {
                triggerEncounter(currentMap, px, py);
            }
        }
    }
}

// ── PHASER INIT ─────────────────────────────────────────
const wrap = document.getElementById('aventura-wrap');
const game = new Phaser.Game({
    type:   Phaser.AUTO,
    width:  wrap.clientWidth,
    height: wrap.clientHeight,
    parent: 'phaser-container',
    backgroundColor: '#2d5a1b',
    pixelArt: true,
    physics: { default: 'arcade', arcade: { debug: false } },
    scene:  [AdventureScene],
});

window.addEventListener('resize', () => {
    game.scale.resize(wrap.clientWidth, wrap.clientHeight);
});

// ── TRANSITIONS ──────────────────────────────────────────
function doTransition(targetMap, fromMap) {
    if (transitioning) return;
    transitioning = true;

    const fade = document.getElementById('transition-fade');
    fade.style.opacity = '1';

    setTimeout(() => {
        const url = new URL(window.location.href);
        url.searchParams.set('map', targetMap);
        url.searchParams.set('from', fromMap);
        window.location.href = url.toString();
    }, 400);
}

// ── ENCOUNTER ────────────────────────────────────────────
function triggerEncounter(mapName, px, py) {
    inEncounter = true;
    encounterCooldown = 5000;
    sessionStorage.setItem('aventura_map', mapName);
    sessionStorage.setItem('aventura_x', Math.round(px));
    sessionStorage.setItem('aventura_y', Math.round(py));
    document.getElementById('encounter-msg').textContent =
        'Ești în zona sălbatică. Vrei să lupți sau să fugi?';
    document.getElementById('encounter-overlay').style.display = 'flex';
}

function closeEncounter() {
    inEncounter = false;
    encounterCooldown = 3000;
    document.getElementById('encounter-overlay').style.display = 'none';
}

function goToVanatoare() {
    const mapName = sessionStorage.getItem('aventura_map') || '01_EntryMap';
    window.location.href = '/joc/petomania/vanatoare?zone=' + mapName;
}

// ── VACA ─────────────────────────────────────────────────
let vacaCooldown = false;

function showVacaDialog() {
    if (vacaCooldown) return;
    inEncounter = true;
    document.getElementById('vaca-msg').textContent = '';
    document.getElementById('vaca-dialog').style.display = 'flex';
}

function closeVacaDialog() {
    inEncounter = false;
    document.getElementById('vaca-dialog').style.display = 'none';
}

async function mulgeVaca() {
    const resp = await fetch('/joc/petomania/api/aventura/mulge', { method: 'POST' });
    const data = await resp.json();
    document.getElementById('vaca-msg').textContent = data.msg || (data.ok ? '🥛 Ai primit Lapte Proaspăt!' : '❌ Eroare.');
    if (data.ok) {
        vacaCooldown = true;
        setTimeout(() => {
            closeVacaDialog();
            vacaCooldown = false;
        }, 2000);
    }
}

// ── ZUNO NPC ─────────────────────────────────────────────
const ZUNO_DIALOGS = {
    'Zuno': {
        intro: `Psst... tu, da, tu. Vino-ncoace.<br><br>
                Am nevoie de un serviciu mic. Știi vacile alea de pe câmp?
                Mulge una pentru mine și îți dau <span style="color:#c9a84c;font-weight:700">150 Dacoins</span>.<br><br>
                Nu e ilegal... exact. E doar... discret.`,
        accept: `Bine, știam că ești deștept. Adu-mi un lapte și ne înțelegem.<br><br>
                 <span style="color:rgba(255,255,255,0.5);font-size:12px">*Zuno se uită nervos în jur*</span>`,
        decline: `Hm. Cum vrei. Dar dacă te răzgândești, știi unde mă găsești.<br><br>
                  <span style="color:rgba(255,255,255,0.5);font-size:12px">*Zuno întoarce spatele cu o mișcare teatrală*</span>`,
        complete: `Da, da, exact asta îmi trebuia! <span style="color:#c9a84c;font-weight:700">150 Dacoins</span> cum am promis.<br><br>
                   Poate mai ai nevoie de Dacoins mâine? Știi unde mă găsești.`,
        already_done: `Ai mai făcut o treabă bună azi. Revino mâine, am să am altă nevoie.<br><br>
                       <span style="color:rgba(255,255,255,0.5);font-size:12px">*Zuno verifică sticla cu satisfacție*</span>`,
        no_milk: `Unde e laptele? Nu pot să te plătesc fără lapte.<br><br>
                  Du-te și mulge o vacă mai întâi, apoi vorbim.`,
    }
};

function showNpcDialog(npcName) {
    const npc = npcName || 'Zuno';
    inEncounter = true;
    document.getElementById('zuno-msg').textContent = '';
    fetch('/joc/petomania/api/aventura/zuno/status')
        .then(r => r.json())
        .then(data => {
            const dialog = ZUNO_DIALOGS['Zuno'];
            const textEl = document.getElementById('zuno-text');
            const actEl  = document.getElementById('zuno-actions');
            actEl.innerHTML = '';

            const mkBtn = (label, style, fn) => {
                const b = document.createElement('button');
                b.innerHTML = label;
                b.style.cssText = style;
                b.onclick = fn;
                actEl.appendChild(b);
            };

            const baseBtn = 'font-family:Cinzel,serif;font-weight:700;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;border:none;';

            if (data.quest_done) {
                textEl.innerHTML = dialog.already_done;
                mkBtn('← Pleacă', baseBtn + 'background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2)!important;', closeZunoDialog);
            } else if (data.quest_accepted && !data.has_milk) {
                textEl.innerHTML = dialog.no_milk;
                mkBtn('← Pleacă', baseBtn + 'background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2)!important;', closeZunoDialog);
            } else if (data.quest_accepted && data.has_milk) {
                textEl.innerHTML = dialog.accept;
                mkBtn('✅ Dă laptele', baseBtn + 'background:#c9a84c;color:#1a1300;', deliverMilk);
                mkBtn('← Mai târziu', baseBtn + 'background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2)!important;', closeZunoDialog);
            } else {
                textEl.innerHTML = dialog.intro;
                mkBtn('✅ Accept', baseBtn + 'background:#c9a84c;color:#1a1300;', acceptZunoQuest);
                mkBtn('❌ Refuz', baseBtn + 'background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2)!important;', () => {
                    textEl.innerHTML = dialog.decline;
                    actEl.innerHTML = '';
                    mkBtn('← Pleacă', baseBtn + 'background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2)!important;', closeZunoDialog);
                });
            }

            document.getElementById('zuno-dialog').style.display = 'flex';
        });
}

function closeZunoDialog() {
    inEncounter = false;
    document.getElementById('zuno-dialog').style.display = 'none';
}

async function acceptZunoQuest() {
    const resp = await fetch('/joc/petomania/api/aventura/zuno/accept', { method: 'POST' });
    const data = await resp.json();
    const dialog = ZUNO_DIALOGS['Zuno'];
    document.getElementById('zuno-text').innerHTML = dialog.accept;
    document.getElementById('zuno-actions').innerHTML = '';
    const b = document.createElement('button');
    b.innerHTML = '← Înțeles';
    b.style.cssText = 'font-family:Cinzel,serif;font-weight:700;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);';
    b.onclick = closeZunoDialog;
    document.getElementById('zuno-actions').appendChild(b);
}

async function deliverMilk() {
    const resp = await fetch('/joc/petomania/api/aventura/zuno/deliver', { method: 'POST' });
    const data = await resp.json();
    if (data.ok) {
        document.getElementById('zuno-text').innerHTML = ZUNO_DIALOGS['Zuno'].complete;
        document.getElementById('zuno-msg').textContent = `+150 ✦ Dacoins`;
        document.getElementById('zuno-actions').innerHTML = '';
        const b = document.createElement('button');
        b.innerHTML = '← Mulțumesc';
        b.style.cssText = 'font-family:Cinzel,serif;font-weight:700;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;background:#c9a84c;color:#1a1300;border:none;';
        b.onclick = closeZunoDialog;
        document.getElementById('zuno-actions').appendChild(b);
    } else {
        document.getElementById('zuno-msg').textContent = data.msg || 'Eroare.';
    }
}
</script>
{% endblock %}
