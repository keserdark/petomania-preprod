{% extends "base_joc.html" %}
{% block content_class %}pet-content-city{% endblock %}
{% block title %}Piață{% endblock %}

{% block content %}
<div class="city-wrap city-wrap-wide">
    <canvas id="city-canvas"></canvas>
    <div id="city-tooltip" class="city-tooltip"></div>

    <!-- Buton Locatii -->
    <button class="room-care-btn" id="btn-locatii" onclick="toggleLocatii()" style="z-index:30;">
        🗺️ Locații
    </button>
	<a href="{{ url_for('oras') }}" class="room-care-btn" 
		style="z-index:30; top:auto; bottom:14px; right:auto; left:14px;">
		← Oraș
	</a>

    <!-- Panel Locatii -->
    <div class="city-locations-panel" id="city-locations-panel">
        <div class="city-loc-header">
            <span>🗺️ Locații</span>
            <button class="care-panel-close" onclick="toggleLocatii()">✕</button>
        </div>
        <a href="/joc/petomania/assets" class="city-loc-item">
            <span class="city-loc-icon">🛒</span>
            <div>
                <div class="city-loc-name">Assets</div>
                <div class="city-loc-desc">Echipamente și obiecte</div>
            </div>
        </a>
        <a href="/joc/petomania/consumable" class="city-loc-item">
            <span class="city-loc-icon">🧪</span>
            <div>
                <div class="city-loc-name">Consumabile</div>
                <div class="city-loc-desc">Poțiuni și hrană</div>
            </div>
        </a>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script>
const W = 1365;
const H = 768;

// Day/Night cycle
const hour    = new Date().getHours();
const isNight = hour >= 21 || hour < 8;
const prefix  = isNight ? 'Nighttime' : 'Daytime';

const ZONES = [
    { file: `${prefix}_Assets.png`,     href: '/joc/petomania/assets',     label: '🛒 Assets' },
    { file: `${prefix}_Consumable.png`, href: '/joc/petomania/consumable', label: '🧪 Consumabile' },
];

const BASE    = '/static/piata/';
const canvas  = document.getElementById('city-canvas');
const ctx     = canvas.getContext('2d', { willReadFrequently: true });
const tooltip = document.getElementById('city-tooltip');
const wrap    = canvas.parentElement;

canvas.width  = W;
canvas.height = H;

const bgImg = new Image();
bgImg.crossOrigin = 'anonymous';
bgImg.src = BASE + `${prefix}_Piata.png`;

const zoneImgs = ZONES.map(z => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.src = BASE + z.file;
    return img;
});

const offscreens = ZONES.map(() => {
    const oc = document.createElement('canvas');
    oc.width  = W;
    oc.height = H;
    return oc;
});

let loaded = 0;
const total = ZONES.length + 1;

function onLoad() {
    loaded++;
    if (loaded < total) return;
    ctx.drawImage(bgImg, 0, 0, W, H);
    zoneImgs.forEach((img, i) => {
        ctx.drawImage(img, 0, 0, W, H);
        const oc = offscreens[i].getContext('2d', { willReadFrequently: true });
        oc.drawImage(img, 0, 0, W, H);
    });
}

bgImg.onload = onLoad;
zoneImgs.forEach(img => { img.onload = onLoad; });

// Hit detection
let lastMove = 0;
canvas.addEventListener('mousemove', (e) => {
    const now = Date.now();
    if (now - lastMove < 33) return;
    lastMove = now;
    const rect   = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const x = Math.floor((e.clientX - rect.left) * scaleX);
    const y = Math.floor((e.clientY - rect.top)  * scaleY);

    let hit = null;
    for (let i = zoneImgs.length - 1; i >= 0; i--) {
        const oc    = offscreens[i].getContext('2d', { willReadFrequently: true });
        const alpha = oc.getImageData(x, y, 1, 1).data[3];
        if (alpha > 20) { hit = i; break; }
    }

    if (hit !== null) {
        canvas.style.cursor    = 'pointer';
        tooltip.textContent    = ZONES[hit].label;
        tooltip.style.opacity  = '1';
        tooltip.style.left     = (e.clientX - wrap.getBoundingClientRect().left + 14) + 'px';
        tooltip.style.top      = (e.clientY - wrap.getBoundingClientRect().top  - 8)  + 'px';
        redraw(hit);
    } else {
        canvas.style.cursor   = 'default';
        tooltip.style.opacity = '0';
        redraw(null);
    }
});

canvas.addEventListener('click', (e) => {
    const rect   = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const x = Math.floor((e.clientX - rect.left) * scaleX);
    const y = Math.floor((e.clientY - rect.top)  * scaleY);
    for (let i = zoneImgs.length - 1; i >= 0; i--) {
        const oc    = offscreens[i].getContext('2d', { willReadFrequently: true });
        const alpha = oc.getImageData(x, y, 1, 1).data[3];
        if (alpha > 20) { window.location = ZONES[i].href; return; }
    }
});

canvas.addEventListener('mouseleave', () => {
    tooltip.style.opacity = '0';
    canvas.style.cursor   = 'default';
    redraw(null);
});

function redraw(hoverIdx) {
    ctx.clearRect(0, 0, W, H);
    ctx.drawImage(bgImg, 0, 0, W, H);
    zoneImgs.forEach((img, i) => {
        if (i === hoverIdx) {
            ctx.save();
            ctx.filter = 'brightness(1.4) drop-shadow(0 0 18px rgba(255,215,0,1))';
            ctx.drawImage(img, 0, 0, W, H);
            ctx.restore();
        } else {
            ctx.drawImage(img, 0, 0, W, H);
        }
    });
}

// Fade pulse automat
let isHovering = false;
let fadeAlpha  = 0;
let fadeDir    = 1;
let fadActive  = false;

function fadeStep() {
    if (isHovering) return;
    fadeAlpha += fadeDir * 0.05;
    if (fadeAlpha >= 1) {
        fadeAlpha = 1; fadeDir = -1;
    } else if (fadeAlpha <= 0) {
        fadeAlpha = 0; fadeDir = 1; fadActive = false;
        ctx.clearRect(0, 0, W, H);
        ctx.drawImage(bgImg, 0, 0, W, H);
        zoneImgs.forEach(img => ctx.drawImage(img, 0, 0, W, H));
        return;
    }
    ctx.clearRect(0, 0, W, H);
    ctx.drawImage(bgImg, 0, 0, W, H);
    zoneImgs.forEach(img => ctx.drawImage(img, 0, 0, W, H));
    ctx.save();
    ctx.globalAlpha = fadeAlpha * 0.35;
    ctx.globalCompositeOperation = 'lighter';
    zoneImgs.forEach(img => ctx.drawImage(img, 0, 0, W, H));
    ctx.restore();
    requestAnimationFrame(fadeStep);
}

setInterval(() => {
    if (isHovering || fadActive) return;
    fadActive = true; fadeAlpha = 0; fadeDir = 1;
    requestAnimationFrame(fadeStep);
}, 3000);

canvas.addEventListener('mouseenter', () => { isHovering = true; fadActive = false; });
canvas.addEventListener('mouseleave', () => { isHovering = false; redraw(null); });

function toggleLocatii() {
    const panel = document.getElementById('city-locations-panel');
    const btn   = document.getElementById('btn-locatii');
    const open  = panel.classList.toggle('city-loc-open');
    btn.style.opacity = open ? '0' : '1';
    btn.style.pointerEvents = open ? 'none' : 'auto';
}
</script>
{% endblock %}
